services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    working_dir: /app
    command: go run ./cmd/server/main.go
    environment:
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-3000}
      DATABASE_PATH: ${DATABASE_PATH:-/data/olt-api.db}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_TTL: ${CACHE_TTL:-60s}
      SCRAPER_TIMEOUT: ${SCRAPER_TIMEOUT:-30s}
      SCRAPER_MAX_WORKERS: ${SCRAPER_MAX_WORKERS:-200}
      LOGGING_LEVEL: ${LOGGING_LEVEL:-info}
      LOGGING_FILE: ${LOGGING_FILE:-/data/logs/app.log}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-12h}
      AUTH_INITIAL_USERNAME: ${AUTH_INITIAL_USERNAME:-admin}
      AUTH_INITIAL_PASSWORD: ${AUTH_INITIAL_PASSWORD:-admin}
    volumes:
      - ./:/app
      - backend_data:/data
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: start-frontend-dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  go_pkg_mod:
  go_build_cache:
  frontend_node_modules:
